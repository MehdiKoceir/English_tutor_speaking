version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  tutor-backend:
    build: .
    container_name: tutor-fastapi-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - API_KEY=my_secure_secret_tutor_key
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-models:
    driver: local
